phase: 220
schema_version: 1
# SOURCE-FLOOR anchor: finalized by Plan 02 Task 3 with `git rev-parse HEAD` immediately before commit.
# The wrapper compares protected source paths against this SHA and allows HEAD to move ahead later.
base_sha: "PENDING_PLAN_02_COMMIT"
locked_at: "2026-05-30"
# R1 mapping: CONTEXT {loss, queue_delay} maps to Phase 214 {reflector_loss, cake_queue_mismatch}; jitter, host_kernel, signal_none are excluded.
driver_allowlist: ["reflector_loss", "cake_queue_mismatch"]

thresholds:
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  canonical_control_p99_kill_ms: 200
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  canonical_min_windows_kill: 2
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  canonical_max_windows_kill_total: 3
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  supplemental_defect_p99_ms: 500
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  supplemental_defect_min_windows: 2
  # Pre-Registered CRITERIA-01 Thresholds — LOCKED
  supplemental_carry_multiplier_of_control: 1.5

windows:
  off-peak: { hours: [1, 2, 3, 4, 5] }
  daytime: { hours: [10, 11, 12, 13, 14, 15, 16] }
  prime-time: { hours: [19, 20, 21, 22] }

targets:
  - { name: dallas, kind: canonical, host: dallas, flent_target_hint: "phase214 canonical" }
  - { name: vultr-dallas, kind: supplemental, host: vultr-dallas, flent_target_hint: "vultr dallas reflector" }
  - { name: vultr-chicago, kind: supplemental, host: vultr-chicago, flent_target_hint: "vultr chicago reflector" }

paths:
  # Bind IPs verified against `ip -4 addr show` on 2026-05-31:
  # spectrum=10.10.110.226 and att=10.10.110.233 are both bound on enp6s18.
  # ATT egress_signature captured with `curl --interface 10.10.110.233 https://ifconfig.io` on 2026-05-31.
  - { name: spectrum, bind_map: "spectrum=10.10.110.226", egress_signature: "70.123.224.169" }
  - { name: att, bind_map: "att=10.10.110.233", egress_signature: "99.126.115.47" }

cells:
  # Listed explicitly (not auto-expanded) so REQ traceability is a static read.
  - { cell_id: "dallas__spectrum__off-peak", target: dallas, path: spectrum, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "dallas__spectrum__daytime", target: dallas, path: spectrum, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "dallas__spectrum__prime-time", target: dallas, path: spectrum, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "dallas__att__off-peak", target: dallas, path: att, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "dallas__att__daytime", target: dallas, path: att, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "dallas__att__prime-time", target: dallas, path: att, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__spectrum__off-peak", target: vultr-dallas, path: spectrum, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__spectrum__daytime", target: vultr-dallas, path: spectrum, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__spectrum__prime-time", target: vultr-dallas, path: spectrum, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__att__off-peak", target: vultr-dallas, path: att, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__att__daytime", target: vultr-dallas, path: att, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-dallas__att__prime-time", target: vultr-dallas, path: att, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__spectrum__off-peak", target: vultr-chicago, path: spectrum, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__spectrum__daytime", target: vultr-chicago, path: spectrum, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__spectrum__prime-time", target: vultr-chicago, path: spectrum, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__att__off-peak", target: vultr-chicago, path: att, window: off-peak, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__att__daytime", target: vultr-chicago, path: att, window: daytime, replicates: 3, inter_cell_delay_sec: 60 }
  - { cell_id: "vultr-chicago__att__prime-time", target: vultr-chicago, path: att, window: prime-time, replicates: 3, inter_cell_delay_sec: 60 }

statistical:
  mwu:
    seed: 220
    tie_correction: "wilcoxon-mid-rank"
    continuity_correction: false
  bootstrap_ci:
    seed: 220
    B: 2000
    method: "percentile"
    statistic: "median_difference"
    alpha: 0.05
