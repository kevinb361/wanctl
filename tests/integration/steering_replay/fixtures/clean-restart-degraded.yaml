name: clean-restart-degraded
description: >-
  PROOF-02 reproduction for folded todo
  2026-04-17-investigate-steering-degraded-on-clean-restart: at
  2026-04-17 21:05:27 the first clean-restart cycle loaded persisted
  SPECTRUM_DEGRADED even though measurements were healthy.
harness_mode: hysteresis-only
cycle_budget_derivation:
  mode: hysteresis-only
  confidence_disabled: true
  rationale: >-
    cycles chosen against simple degraded-to-good recovery hysteresis with
    SteeringConfig.use_confidence_scoring=False; 35 cycles exceed the observed
    15-cycle recovery window used by the existing recovery fixture.
corpus_source: derived-from-phase-212-evidence
derivation: >-
  binary on/off + autorate-baseline authority; persisted DEGRADED on clean
  restart is interesting because a pre-enabled steering rule could keep traffic
  effectively steered without measurement-driven justification.
pre_state:
  steering_pre_state:
    current_state: SPECTRUM_DEGRADED
    good_count: 0
    baseline_rtt: 25.0
    history_rtt: [25, 25, 25, 25, 25]
    history_delta: [0.5, 0.5, 0.5, 0.5, 0.5]
    transitions: []
    last_transition_time: null
    rtt_delta_ewma: 0.5
    queue_ewma: 0.0
    cake_drops_history: []
    queue_depth_history: []
    cake_state_history: []
    red_count: 0
    congestion_state: GREEN
    cake_read_failures: 0
  autorate_state_by_cycle:
    default:
      ewma:
        baseline_rtt: 25.0
      congestion:
        dl_state: GREEN
        ul_state: GREEN
initial_steering_rule_state: true
observation_targets:
  - pre_steering_rule_state
  - cycle_1_observed_current_state
  - cycle_1_effective_steering_state
  - effective_steering_state_per_cycle
  - enable_steering_call_log
  - disable_steering_call_log
  - recovery_cycle_to_GOOD
  - effective_steering_during_recovery_window
acceptable_outcomes:
  - reproduced-intentional
  - reproduced-bug
  - not-reproducible
cycles:
  - &good_cycle
    inputs:
      live_rtt_ms: 25.5
      cake_drops: 0
      queued_packets: 0
    expected_decision: observe
