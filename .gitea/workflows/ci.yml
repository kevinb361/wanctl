name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validation-only CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --group dev --all-extras

      - name: Provision system tooling for gate scripts
        # Predeploy/preflight gate tests run scripts under a hardcoded minimal
        # PATH=/usr/bin:/bin, so they use the container's system interpreter and
        # tools. Those scripts need pyyaml (only non-stdlib module used) and the
        # `ip` command (iproute2, for `ip route get` preflight probes). Deploy
        # hosts have both; the bare act container does not.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml iproute2

      - name: Run canonical validation gate
        run: make ci
