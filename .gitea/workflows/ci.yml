name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validation-only CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --group dev --all-extras

      - name: Provision system pyyaml
        # The predeploy-gate tests run scripts under a hardcoded minimal
        # PATH=/usr/bin:/bin, so their `python3` is the container's system
        # interpreter. Those scripts import pyyaml (the only non-stdlib module
        # any script uses). Production deploy hosts have it system-wide; the
        # bare act container does not — install it so the gate scripts run.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml

      - name: Run canonical validation gate
        run: make ci
