name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validation-only CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --group dev --all-extras

      - name: Run canonical validation gate
        # Activate the venv so subprocess `python3` in gate scripts
        # (e.g. phase201-predeploy-gate.sh) resolves to the project
        # interpreter with pyyaml, not the wheel-less container system python.
        run: |
          . .venv/bin/activate
          make ci
