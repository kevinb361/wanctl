name: Manual Deploy Dry Run

"on":
  workflow_dispatch:
    inputs:
      wan:
        description: "WAN to render"
        required: true
        default: "spectrum"
        type: choice
        options:
          - spectrum
          - att
      target_host:
        description: "Target host rendered into the dry-run plan only"
        required: true
        default: "cake-shaper"
        type: string
      deploy_mode:
        description: "Deployment shape to render"
        required: true
        default: "spectrum-cake-autorate"
        type: choice
        options:
          - base
          - steering
          - spectrum-cake-autorate
          - att-cake-autorate

jobs:
  dry-run:
    name: Manual deploy dry-run gate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run canonical validation gate
        run: make ci

      - name: Render deploy and rollback dry-run plans
        run: |
          scripts/deploy-dry-run-gate.sh \
            --wan "${{ inputs.wan }}" \
            --target-host "${{ inputs.target_host }}" \
            --deploy-mode "${{ inputs.deploy_mode }}"
